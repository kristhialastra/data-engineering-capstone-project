# dbt Project Configuration
# Minimal setup para sa movies_pipeline Gold layer transformations
# Walang model configurations dito — idadagdag sa ibang pagkakataon

name: 'movies_pipeline'
version: '1.0.0'
config-version: 2

# Profile name na naka-match sa profiles.yml
profile: 'movies_pipeline'

# Standard directory paths para sa dbt project
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  movies_pipeline:
    staging:
      +materialized: view       # staging = views, no storage cost, always fresh
    intermediate:
      +materialized: view       # intermediate = views, no redundant storage
    marts:
      +materialized: table      # marts = tables, fast for Power BI direct query
